spring.application.name=UniOS

# ===================================================
# DATABASE — PostgreSQL
# Override DB_PASSWORD env var before deploying
# ===================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/unios
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# ===================================================
# DATABASE INIT — Auto-seed on new deployment
# Set to 'always' on first deployment, then switch to 'never'
# ===================================================
spring.sql.init.mode=${APP_DB_AUTO_SEED:never}
spring.sql.init.data-locations=classpath:db/unios_dump.sql

# ===================================================
# MAIL
# Override MAIL_USERNAME / MAIL_PASSWORD env vars before deploying
# ===================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@domain.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================
# DATABASE CONNECTION POOL (HikariCP)
# ===================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================================================
# AGENT FRAMEWORK
# ===================================================
unios.agent.pool-size=10
unios.agent.queue-capacity=2000
unios.agent.retry-max=3
unios.agent.llm-timeout-ms=30000

# ===================================================
# OPTAPLANNER
# ===================================================
optaplanner.solver.termination.spent-limit=5s

# ===================================================
# RETELL AI
# ===================================================
retell.api.key=${RETELL_API_KEY:your_retell_api_key}
retell.agent.id=${RETELL_AGENT_ID:your_retell_agent_id}
retell.from.number=${RETELL_FROM_NUMBER:your_retell_phone_number}

# ===================================================
# LLM — Ollama runs LOCALLY alongside the backend.
# No more Google Colab tunnel needed.
# Make sure Ollama is running: ollama serve
# Make sure model is pulled: ollama pull llama3.2
# ===================================================
ollama.api.url=${OLLAMA_API_URL:http://localhost:11434/api/generate}
ocr.api.url=${OCR_API_URL:http://localhost:11434}
ollama.model=llama3.2
ollama.debug.enabled=false

# ===================================================
# FRONTEND URL — Change this to your server IP/domain before deploying.
# All emails sent to students will contain links based on this URL.
# Example: app.frontend.url=http://192.168.1.100:5173
# Example: app.frontend.url=https://unios.yourdomain.com
# ===================================================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ===================================================
# LOGGING — Clean terminal output
# Only show WARN/ERROR for agents and internal libs.
# HTTP requests (200, 404, etc.) still print via access log.
# ===================================================

# Root level: only warnings and errors
logging.level.root=WARN

# Spring Boot startup banner/info still shows
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.boot.autoconfigure=WARN

# Show HTTP request lines (method + status code)
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.springframework.web=WARN

# Silence all internal agent/scheduler/tool packages
logging.level.com.unios.service.agents=WARN
logging.level.com.unios.service.orchestrator=WARN
logging.level.com.unios=WARN

# Silence Hibernate, HikariCP, and other framework noise
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.scheduling=WARN
logging.level.ai.timefold=WARN
logging.level.org.springframework.orm=WARN

# Enable simple access log: prints "GET /api/xyz 200" lines
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=WARN