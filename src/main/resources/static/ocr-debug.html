<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University OS - OCR Scanner Debug</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: #1e293b; border-radius: 12px; padding: 30px; width: 100%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        .upload-box { border: 2px dashed #475569; padding: 40px; border-radius: 8px; text-align: center; margin-bottom: 20px; transition: 0.3s; cursor: pointer; }
        .upload-box:hover { border-color: #38bdf8; background: #334155; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .results { margin-top: 30px; display: none; }
        .stat-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat { background: #334155; padding: 20px; border-radius: 8px; flex: 1; text-align: center; border-left: 4px solid #38bdf8; }
        .raw-text { background: #000; color: #10b981; padding: 15px; border-radius: 4px; font-family: monospace; height: 200px; overflow-y: scroll; white-space: pre-wrap; font-size: 12px; }
        label { display: block; margin-bottom: 10px; color: #94a3b8; font-weight: bold; }
    </style>
</head>
<body>

    <h1>OCR Scanner Diagnostics</h1>
    
    <div class="card">
        <label>Upload Marksheet (PDF/PNG/JPG)</label>
        <div class="upload-box" id="dropZone">
            Click to select or drag & drop file
            <input type="file" id="fileInput" hidden accept="image/*,.pdf">
        </div>
        
        <button id="scanBtn">START HEURISTIC SCAN</button>

        <div class="results" id="results">
            <div class="stat-box">
                <div class="stat">
                    <div style="font-size: 12px; opacity: 0.7;">MARKS FOUND</div>
                    <div id="marksVal" style="font-size: 24px; font-weight: bold;">0</div>
                </div>
                <div class="stat">
                    <div style="font-size: 12px; opacity: 0.7;">PERCENTAGE</div>
                    <div id="percVal" style="font-size: 24px; font-weight: bold;">0%</div>
                </div>
            </div>

            <label>RAW OCR OUTPUT (OCR.SPACE ENGINE 2)</label>
            <div class="raw-text" id="rawText"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const scanBtn = document.getElementById('scanBtn');
        const results = document.getElementById('results');

        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            if(e.target.files.length > 0) {
                dropZone.innerText = e.target.files[0].name;
                dropZone.style.borderColor = "#38bdf8";
            }
        };

        scanBtn.onclick = async () => {
            const file = fileInput.files[0];
            if(!file) return alert("Please select a file first!");

            scanBtn.innerText = "SCANNING...";
            scanBtn.disabled = true;
            results.style.display = "none";

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/debug/ocr/test', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                document.getElementById('marksVal').innerText = data.marks;
                document.getElementById('percVal').innerText = data.percentage.toFixed(2) + "%";
                document.getElementById('rawText').innerText = data.rawText;
                
                results.style.display = "block";
            } catch (e) {
                alert("Scan failed: " + e.message);
            } finally {
                scanBtn.innerText = "START HEURISTIC SCAN";
                scanBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
