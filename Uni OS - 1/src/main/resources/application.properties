spring.application.name=UniOS

# ===================================================
# DATABASE — PostgreSQL
# Override DB_PASSWORD env var before deploying
# ===================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/unios
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# ===================================================
# DATABASE INIT — Auto-seed on new deployment
# Set to 'always' on first deployment, then switch to 'never'
# ===================================================
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:db/unios_dump.sql

# ===================================================
# MAIL
# Override MAIL_USERNAME / MAIL_PASSWORD env vars before deploying
# ===================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:srihari02045@gmail.com}
spring.mail.password=${MAIL_PASSWORD:wzilpnsecgtaamdv}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================
# DATABASE CONNECTION POOL (HikariCP)
# ===================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================================================
# AGENT FRAMEWORK
# ===================================================
unios.agent.pool-size=10
unios.agent.queue-capacity=2000
unios.agent.retry-max=3
unios.agent.llm-timeout-ms=30000

# ===================================================
# OPTAPLANNER
# ===================================================
optaplanner.solver.termination.spent-limit=5s

# ===================================================
# RETELL AI
# ===================================================
retell.api.key=key_d4a7b81d12f68174f23dce76e624
retell.agent.id=agent_6dfc97c8514e66144b8ea5f15d
retell.from.number=+16362751168

# ===================================================
# LLM — Ollama runs LOCALLY alongside the backend.
# No more Google Colab tunnel needed.
# Make sure Ollama is running: ollama serve
# Make sure model is pulled: ollama pull llama3.2
# ===================================================
ollama.api.url=http://localhost:11434/api/generate
ocr.api.url=http://localhost:11434
ollama.model=llama3.2
ollama.debug.enabled=false

# ===================================================
# FRONTEND URL — Change this to your server IP/domain before deploying.
# All emails sent to students will contain links based on this URL.
# Example: app.frontend.url=http://192.168.1.100:5173
# Example: app.frontend.url=https://unios.yourdomain.com
# ===================================================
app.frontend.url=http://localhost:5173